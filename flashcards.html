<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/flashcards.css"> 
    
    <title>Flashcards</title>
</head>

<body class="body">

    <nav class="topnav" id="topNavBar">
    <button id="hamburger" class="hamburger" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
    </button>
        <div class="navLinks" id="myLinks">
            <a href="index.html">Home</a>
            <a href="flashcards.html">Flashcards</a>
            <a href="locations.html">Locations</a>
        </div>
    </nav>

    <main class="mainContainer" id="card">

        <div class="cardContainer" id="engCardContent">
                <i class="cardItem top engCardItem" id="category">Category</i> 
                <h2 class="cardItem engCardItem" id="english">English Word</h2>
                <h2 class="cardItem engCardItem" id="engExample">English Example</h2>
                <i class="cardItem engCardItem flipText">Click to Flip</i>
        </div>

        <div class="cardContainer" id="malCardContent">
                <h3 class="cardItem top malCardItem" id="malayalam">മലയാളം</h2>  
                <h2 class="cardItem malCardItem translit" id="translit">Transliteration</h2>
                <h2 class="cardItem malCardItem" id="malExample">Malayalam Example</h2>
                <h2 class="cardItem malCardItem translit" id="malExampleTranslit">Example Transliteration</h2>
                <i class="cardItem malCardItem flipText">Click to Flip Back</i>
        </div>

        <div class="cardButtons" id="cardButtons">
            <div class="nextPrevButtonsDiv">
                <button class=nextButton id="nextButton"><div class="nextButtonText">Next</div> <div>⏭️</div></button>
                <button class="prevButton" id="prevButton"><div class="prevButtonText">Prev</div> <div>⏮️</div></button>
            </div>
            <button id="playButton">Play ⏯️</button>
            <button id="shuffleButton">Shuffle 🔀</button>
            <button id="resetButton">Reset 🔄️</button>
            <button class="toggleTranslit" id="toggleTranslit">Hide Transliteration</button>
            <button class="searchButton" id="searchButton">Deep Dive 🐳</button>
            
        </div>

    </main>

    <aside class="statsContainer" id="statsContainer">
        <div class="counter" id="counterContainer">
            <div id="cardsViewed"></div>
        </div>

        <div class="counter" id="timerContainer">
            <div id="timeElapsed"></div>
        </div>
    </aside>

    <footer class="footer" id="footer"></footer>
    <script type="module" src="js/flashcards.js"></script>
</body>

</html>
